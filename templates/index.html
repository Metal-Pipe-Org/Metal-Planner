<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Planer podróży — Wrocław</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="map"></div>

<button id="panel-toggle" title="Pokaż/ukryj panel">☰</button>

<div id="panel">

    <h1>Planer podróży</h1>

    {% if data_error %}

    <div class="error">{{ data_error }}</div>

    {% else %}

    <p class="hint">
        Kliknij na mapie przystanek startowy, potem docelowy —
        albo wpisz nazwy ręcznie.
    </p>

    <label for="start">Przystanek początkowy</label>
    <input type="text" id="start" list="stops" placeholder="np. Katedra">

    <label for="end">Przystanek docelowy</label>
    <input type="text" id="end" list="stops" placeholder="np. pl. Grunwaldzki">

    <label for="time">Odjazd o (dzisiaj)</label>
    <input type="time" id="time" value="{{ form_time }}">

    <datalist id="stops">
        {% for name in stops %}<option value="{{ name }}">{% endfor %}
    </datalist>

    <div class="buttons">
        <button id="search">Szukaj połączenia</button>
        <button id="clear">Wyczyść</button>
    </div>

    <div id="result"></div>

    {% endif %}

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {preferCanvas: true, zoomControl: false})
    .setView([51.107, 17.038], 13);
L.control.zoom({position: 'topright'}).addTo(map);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap',
}).addTo(map);

document.getElementById('panel-toggle').addEventListener('click', () => {
    document.getElementById('panel').classList.toggle('hidden');
});

const startInput = document.getElementById('start');
const endInput = document.getElementById('end');
const resultBox = document.getElementById('result');

if (startInput) {   // brak tych pól = brak bazy rozkładów (panel pokazuje błąd)

    const markersByName = new Map();          // nazwa -> [L.circleMarker, ...]
    let sel = {start: null, end: null};       // przystanki wybrane kliknięciem
    let routeLayer = null;

    const BASE_STYLE = {radius: 4, weight: 1, color: '#1565c0',
                        fillColor: '#42a5f5', fillOpacity: 0.8};
    // Gdy pokazujemy przepływy, zwykłe przystanki schodzą na dalszy plan.
    const DIM_STYLE = {radius: 2.5, weight: 0, color: '#90a4ae',
                       fillColor: '#90a4ae', fillOpacity: 0.25};
    let baseDimmed = false;

    function styleFor(name) {
        if (name === sel.start) return {radius: 8, weight: 2, color: '#1b5e20',
                                        fillColor: '#4caf50', fillOpacity: 1};
        if (name === sel.end) return {radius: 8, weight: 2, color: '#b71c1c',
                                      fillColor: '#ef5350', fillOpacity: 1};
        return baseDimmed ? DIM_STYLE : BASE_STYLE;
    }

    function setBaseDim(dim) {
        if (baseDimmed === dim) return;
        baseDimmed = dim;
        for (const [name, markers] of markersByName) {
            const style = styleFor(name);
            for (const m of markers) m.setStyle(style);
        }
    }

    function restyle(...names) {
        for (const name of names) {
            if (!name) continue;
            for (const m of markersByName.get(name) || []) m.setStyle(styleFor(name));
        }
    }

    function clearRoute() {
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        setBaseDim(false);
        resultBox.innerHTML = '';
    }

    function pickStop(name) {
        const previous = [sel.start, sel.end];
        if (!sel.start || (sel.start && sel.end)) {
            sel = {start: name, end: null};   // kolejne kliknięcie zaczyna od nowa
            clearRoute();
        } else if (name !== sel.start) {
            sel.end = name;
        }
        startInput.value = sel.start || '';
        endInput.value = sel.end || '';
        restyle(...previous, sel.start, sel.end);
        if (sel.start && sel.end) search();
    }

    fetch('/api/stops')
        .then(r => r.json())
        .then(stops => {
            if (stops.error) { showError(stops.error); return; }
            for (const s of stops) {
                const m = L.circleMarker([s.lat, s.lon], BASE_STYLE).addTo(map);
                m.bindTooltip(s.name);
                m.on('click', () => pickStop(s.name));
                if (!markersByName.has(s.name)) markersByName.set(s.name, []);
                markersByName.get(s.name).push(m);
            }
        });

    function esc(text) {
        const div = document.createElement('div');
        div.textContent = text ?? '';
        return div.innerHTML;
    }

    function showError(message, suggestions) {
        let html = `<div class="error"><p>${esc(message)}</p>`;
        if (suggestions && suggestions.length) {
            html += '<p>Czy chodziło o:</p><ul>' + suggestions.map(name =>
                `<li><a href="#" data-name="${esc(name)}">${esc(name)}</a></li>`
            ).join('') + '</ul>';
        }
        resultBox.innerHTML = html + '</div>';
    }

    const FLOW_COLORS = {tram: '#c62828', bus: '#1565c0', other: '#6a1b9a'};

    // Mapa przepływów: każdy kurs to jeden ciągły segment od przystanku
    // wsiadania do ostatniego sensownego wyjścia; jasność i grubość linii
    // = zapas czasu najlepszego wyjścia (jednakowa na całym segmencie).
    // Czytelność przy nachodzeniu: jaskrawe segmenty mają białą otoczkę
    // (styl mapy tramwajowej), a najechanie na linię podświetla ją
    // i pokazuje numer - widać, "która co gdzie", nawet w wiązce.
    const BRIGHT_W = 0.45;
    const KIND_LABEL = {tram: 'Tramwaj', bus: 'Autobus', other: 'Linia'};

    function drawFlow(flow) {
        setBaseDim(true);
        const faint = [], casings = [], bright = [];
        const byLine = new Map();  // "num|kind" -> [segmenty] do plakietek

        for (const s of flow.segments) {        // posortowane po w rosnąco
            const key = s.num + '|' + s.kind;
            const color = FLOW_COLORS[s.kind] || FLOW_COLORS.other;
            const weight = 1 + 3.5 * s.w;
            const opacity = 0.10 + 0.85 * s.w;
            const line = L.polyline(s.path, {color, opacity, weight});
            line.bindTooltip(
                `${KIND_LABEL[s.kind] || KIND_LABEL.other} ${s.num}`,
                {sticky: true},
            );
            line.on('mouseover', () => line.setStyle({opacity: 1, weight: weight + 2.5}));
            line.on('mouseout', () => line.setStyle({opacity, weight}));
            if (s.w >= BRIGHT_W) {
                casings.push(L.polyline(s.path, {
                    color: '#fff',
                    opacity: 0.9,
                    weight: weight + 2.5,
                    interactive: false,
                }));
                bright.push(line);
            } else {
                faint.push(line);
            }
            if (!byLine.has(key)) byLine.set(key, []);
            byLine.get(key).push(s);
        }

        // Kolejność: blade tło -> białe otoczki -> jaskrawe korytarze.
        const layers = [...faint, ...casings, ...bright];

        // Plakietki z numerem linii - tylko dla linii, które mają sensowny
        // udział w przepływie; na najjaśniejszym segmencie linii, dłuższe
        // segmenty dostają dodatkowe plakietki w 1/4 i 3/4 trasy.
        for (const [key, segs] of byLine) {
            const best = segs[segs.length - 1];
            if (best.w < 0.4) continue;
            const [num, kind] = key.split('|');
            const positions = new Set([Math.floor(best.path.length / 2)]);
            if (best.path.length >= 20) {
                positions.add(Math.floor(best.path.length / 4));
                positions.add(Math.floor(3 * best.path.length / 4));
            }
            for (const p of positions) {
                layers.push(L.marker(best.path[p], {
                    icon: L.divIcon({
                        className: `line-badge ${kind}`,
                        html: esc(num),
                        iconSize: null,
                    }),
                    interactive: false,
                    opacity: 0.45 + 0.55 * best.w,
                }));
            }
        }

        routeLayer = L.layerGroup(layers).addTo(map);

        // Kadr: najciaśniejszy sensowny próg jasności, żeby nie skakać
        // do widoku całego województwa przez jedną bladą nitkę...
        let points = [];
        for (const threshold of [0.7, BRIGHT_W, 0]) {
            points = flow.segments.filter(s => s.w >= threshold)
                                  .flatMap(s => s.path);
            if (points.length >= 4) break;
        }
        // ...ale start i cel muszą być w kadrze zawsze.
        for (const name of [sel.start, sel.end]) {
            for (const m of markersByName.get(name) || []) {
                const p = m.getLatLng();
                points.push([p.lat, p.lng]);
            }
        }
        if (points.length) {
            map.fitBounds(L.latLngBounds(points), {
                paddingTopLeft: [400, 30],     // miejsce na panel z lewej
                paddingBottomRight: [30, 30],
            });
        }
    }

    function search() {
        const params = new URLSearchParams({
            start: startInput.value,
            end: endInput.value,
            time: document.getElementById('time').value,
        });
        clearRoute();
        resultBox.innerHTML = '<p class="hint">Szukam…</p>';
        fetch('/api/flow?' + params)
            .then(r => r.json())
            .then(flow => {
                if (flow.error) { showError(flow.error, flow.suggestions); return; }
                // Kanoniczne nazwy z API: podświetlenie startu/celu działa
                // też przy ręcznym wpisaniu, nie tylko przy klikaniu w mapę
                // (drawFlow przemalowuje wszystkie markery wg nowego sel).
                sel = {start: flow.start, end: flow.end};
                startInput.value = flow.start;
                endInput.value = flow.end;
                resultBox.innerHTML = '';      // wynik jest tylko na mapie
                drawFlow(flow);
            })
            .catch(() => showError('Nie udało się połączyć z serwerem.'));
    }

    document.getElementById('search').addEventListener('click', search);

    document.getElementById('clear').addEventListener('click', () => {
        const previous = [sel.start, sel.end];
        sel = {start: null, end: null};
        startInput.value = '';
        endInput.value = '';
        clearRoute();
        restyle(...previous);
    });

    // Kliknięcie podpowiedzi wstawia nazwę w pierwsze niepasujące pole.
    const knownNames = () => new Set([...markersByName.keys()].map(n => n.toLowerCase()));
    resultBox.addEventListener('click', event => {
        const name = event.target.dataset && event.target.dataset.name;
        if (!name) return;
        event.preventDefault();
        const known = knownNames();
        if (!known.has(startInput.value.trim().toLowerCase())) {
            startInput.value = name;
        } else {
            endInput.value = name;
        }
        if (startInput.value && endInput.value) search();
    });
}
</script>

</body>
</html>
