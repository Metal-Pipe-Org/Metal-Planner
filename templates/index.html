<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Planer podróży — Wrocław</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="map"></div>

<button id="panel-toggle" title="Pokaż/ukryj panel">☰</button>

<div id="panel">

    <h1>Planer podróży</h1>

    {% if data_error %}

    <div class="error">{{ data_error }}</div>

    {% else %}

    <p class="hint">
        Kliknij na mapie przystanek startowy, potem docelowy —
        albo wpisz nazwy ręcznie. Kliknij prawym przyciskiem na przystanek,
        żeby zobaczyć tablicę odjazdów.
    </p>

    <label class="checkbox-row">
        <input type="checkbox" id="bikes-toggle" checked>
        Stacje roweru miejskiego (WRM)
    </label>

    <label for="start">Przystanek początkowy</label>
    <input type="text" id="start" list="stops" placeholder="np. Katedra">
    <button type="button" id="use-location" class="location-button">📍 Użyj mojej lokalizacji</button>

    <label for="end">Przystanek docelowy</label>
    <input type="text" id="end" list="stops" placeholder="np. pl. Grunwaldzki">

    <label for="time">Odjazd o (dzisiaj)</label>
    <input type="time" id="time" value="{{ form_time }}">

    <label for="qmin">
        Czułość: opcje o jasności ≥ <span id="qmin-value">60</span>%
    </label>
    <input type="range" id="qmin" min="30" max="90" step="5" value="60">

    <datalist id="stops">
        {% for name in stops %}<option value="{{ name }}">{% endfor %}
    </datalist>

    <div class="buttons">
        <button id="search">Szukaj połączenia</button>
        <button id="clear">Wyczyść</button>
    </div>

    <div id="result"></div>

    {% endif %}

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {preferCanvas: true, zoomControl: false})
    .setView([51.107, 17.038], 13);
L.control.zoom({position: 'topright'}).addTo(map);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap',
}).addTo(map);

document.getElementById('panel-toggle').addEventListener('click', () => {
    document.getElementById('panel').classList.toggle('hidden');
});

const startInput = document.getElementById('start');
const endInput = document.getElementById('end');
const resultBox = document.getElementById('result');

if (startInput) {   // brak tych pól = brak bazy rozkładów (panel pokazuje błąd)

    const markersByName = new Map();          // nazwa -> [L.circleMarker, ...]
    let sel = {start: null, end: null};       // przystanki wybrane kliknięciem
    let routeLayer = null;
    let myLocation = null;         // {lat, lon} prawdziwej lokalizacji jako start, albo null
    let myLocationMarker = null;

    function clearMyLocation() {
        if (!myLocation) return;
        myLocation = null;
        if (myLocationMarker) { map.removeLayer(myLocationMarker); myLocationMarker = null; }
    }

    const BASE_STYLE = {radius: 4, weight: 1, color: '#1565c0',
                        fillColor: '#42a5f5', fillOpacity: 0.8};
    // Gdy pokazujemy przepływy, zwykłe przystanki schodzą na dalszy plan.
    const DIM_STYLE = {radius: 2.5, weight: 0, color: '#90a4ae',
                       fillColor: '#90a4ae', fillOpacity: 0.25};
    let baseDimmed = false;

    function styleFor(name) {
        if (name === sel.start) return {radius: 8, weight: 2, color: '#1b5e20',
                                        fillColor: '#4caf50', fillOpacity: 1};
        if (name === sel.end) return {radius: 8, weight: 2, color: '#b71c1c',
                                      fillColor: '#ef5350', fillOpacity: 1};
        return baseDimmed ? DIM_STYLE : BASE_STYLE;
    }

    function setBaseDim(dim) {
        if (baseDimmed === dim) return;
        baseDimmed = dim;
        for (const [name, markers] of markersByName) {
            const style = styleFor(name);
            for (const m of markers) m.setStyle(style);
        }
    }

    function restyle(...names) {
        for (const name of names) {
            if (!name) continue;
            for (const m of markersByName.get(name) || []) m.setStyle(styleFor(name));
        }
    }

    function clearRoute() {
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        setBaseDim(false);
        resultBox.innerHTML = '';
    }

    function pickStop(name) {
        const previous = [sel.start, sel.end];
        if (!sel.start || (sel.start && sel.end)) {
            sel = {start: name, end: null};   // kolejne kliknięcie zaczyna od nowa
            clearRoute();
            clearMyLocation();                // klik na mapie zastępuje ewentualną lokalizację
        } else if (name !== sel.start) {
            sel.end = name;
        }
        startInput.value = sel.start || '';
        endInput.value = sel.end || '';
        restyle(...previous, sel.start, sel.end);
        if (sel.start && sel.end) search();
    }

    // Ręczne wpisanie startu też zastępuje lokalizację - .value ustawiane z JS
    // (pickStop, search) nie odpala 'input', więc to nie gryzie się z powyższym.
    startInput.addEventListener('input', clearMyLocation);

    // Tablica odjazdów: prawy klik na przystanek, osobno od lewego (który
    // wybiera start/cel) - dymek z najbliższymi odjazdami, bez wpływu na
    // wyszukiwanie połączeń.
    function showDepartures(name, latlng) {
        const popup = L.popup({maxWidth: 260})
            .setLatLng(latlng)
            .setContent('<p class="hint">Wczytuję odjazdy…</p>')
            .openOn(map);
        const params = new URLSearchParams({stop: name, time: document.getElementById('time').value});
        fetch('/api/departures?' + params)
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    popup.setContent(`<b>${esc(name)}</b><p class="hint">${esc(data.error)}</p>`);
                    return;
                }
                if (!data.departures.length) {
                    popup.setContent(`<b>${esc(data.stop)}</b><p class="hint">Brak odjazdów do końca dnia.</p>`);
                    return;
                }
                const rows = data.departures.map(d =>
                    `<li><b>${esc(d.time)}</b> ${esc(KIND_LABEL[d.kind] || KIND_LABEL.other)} ${esc(d.line)}`
                    + `<span class="headsign"> → ${esc(d.headsign)}</span></li>`
                ).join('');
                popup.setContent(`<b>${esc(data.stop)}</b><ul class="legs">${rows}</ul>`);
            })
            .catch(() => popup.setContent(`<b>${esc(name)}</b><p class="hint">Nie udało się pobrać odjazdów.</p>`));
    }

    fetch('/api/stops')
        .then(r => r.json())
        .then(stops => {
            if (stops.error) { showError(stops.error); return; }
            for (const s of stops) {
                const m = L.circleMarker([s.lat, s.lon], BASE_STYLE).addTo(map);
                m.bindTooltip(s.name);
                m.on('click', () => pickStop(s.name));
                m.on('contextmenu', e => {
                    L.DomEvent.preventDefault(e.originalEvent);
                    showDepartures(s.name, e.latlng);
                });
                if (!markersByName.has(s.name)) markersByName.set(s.name, []);
                markersByName.get(s.name).push(m);
            }
        });

    function esc(text) {
        const div = document.createElement('div');
        div.textContent = text ?? '';
        return div.innerHTML;
    }

    // Warstwa stacji WRM (rower miejski) — czysto informacyjna, nie wpływa
    // na wyszukiwanie połączeń. Ładowana raz przy starcie, chowana checkboxem.
    function plural(n, one, few, many) {
        if (n === 1) return one;
        const mod10 = n % 10, mod100 = n % 100;
        if (mod10 >= 2 && mod10 <= 4 && !(mod100 >= 12 && mod100 <= 14)) return few;
        return many;
    }

    let bikesLayer = null;
    const bikesToggle = document.getElementById('bikes-toggle');
    // Puste stacje mają celowo zupełnie inny styl (szara "obwódka" zamiast
    // pełnej pomarańczowej kropki) - nie da się ich pomylić ze stacją z rowerami.
    const BIKE_STYLE = {weight: 1, color: '#e65100', fillColor: '#ffb74d', fillOpacity: 0.9};
    const BIKE_EMPTY_STYLE = {radius: 4, weight: 1.5, color: '#9e9e9e', fillColor: '#fff', fillOpacity: 0.35};

    fetch('/api/bikes')
        .then(r => r.json())
        .then(stations => {
            if (stations.error) { console.warn('Stacje WRM:', stations.error); return; }
            const markers = [];
            for (const s of stations) {
                const radius = s.bikes > 0 ? 4 + Math.min(s.bikes, 16) * 0.4 : 4;
                const style = s.bikes > 0 ? {...BIKE_STYLE, radius} : BIKE_EMPTY_STYLE;
                const m = L.circleMarker([s.lat, s.lon], style);
                let tooltip = `${esc(s.name)}<br>${s.bikes} ${plural(s.bikes, 'rower', 'rowery', 'rowerów')}`;
                if (s.electric > 0) {
                    tooltip += ` (w tym ${s.electric} `
                        + `${plural(s.electric, 'elektryczny', 'elektryczne', 'elektrycznych')})`;
                }
                m.bindTooltip(tooltip);
                markers.push(m);
                if (s.electric > 0) {
                    // Skaluje się z promieniem stacji, więc nigdy nie wystaje poza kółko.
                    const size = Math.round(radius * 1.3);
                    markers.push(L.marker([s.lat, s.lon], {
                        icon: L.divIcon({
                            className: 'bike-electric-badge',
                            html: `<span style="font-size:${size}px">⚡︎</span>`,
                            iconSize: [size, size],
                            iconAnchor: [size / 2, size / 2],
                        }),
                        interactive: false,
                    }));
                }
            }
            bikesLayer = L.layerGroup(markers);
            if (bikesToggle.checked) bikesLayer.addTo(map);
        })
        .catch(() => console.warn('Nie udało się pobrać stacji WRM.'));

    bikesToggle.addEventListener('change', () => {
        if (!bikesLayer) return;
        if (bikesToggle.checked) bikesLayer.addTo(map);
        else map.removeLayer(bikesLayer);
    });

    function showError(message, suggestions) {
        let html = `<div class="error"><p>${esc(message)}</p>`;
        if (suggestions && suggestions.length) {
            html += '<p>Czy chodziło o:</p><ul>' + suggestions.map(name =>
                `<li><a href="#" data-name="${esc(name)}">${esc(name)}</a></li>`
            ).join('') + '</ul>';
        }
        resultBox.innerHTML = html + '</div>';
    }

    const FLOW_COLORS = {tram: '#c62828', bus: '#1565c0', other: '#6a1b9a'};

    // Mapa przepływów: każdy kurs to jeden ciągły segment od przystanku
    // wsiadania do ostatniego sensownego wyjścia; jasność i grubość linii
    // = zapas czasu najlepszego wyjścia (jednakowa na całym segmencie).
    // Czytelność przy nachodzeniu: jaskrawe segmenty mają białą otoczkę
    // (styl mapy tramwajowej), a najechanie na linię podświetla ją
    // i pokazuje numer - widać, "która co gdzie", nawet w wiązce.
    const BRIGHT_W = 0.45;
    const KIND_LABEL = {tram: 'Tramwaj', bus: 'Autobus', other: 'Linia'};

    // Zapas na przesiadkę wsiadania w segment - czerwony (ciasno, blisko
    // ustawowego bufora) do zielonego (luz); brak kropki = start trasy,
    // gdzie bufor przesiadki nie ma zastosowania (patrz PROJECT.md).
    const MARGIN_CAP_SEC = 600;   // 10 min i więcej = w pełni "zielono"
    function marginColor(sec) {
        const hue = Math.min(sec, MARGIN_CAP_SEC) / MARGIN_CAP_SEC * 120;
        return `hsl(${hue}, 85%, 42%)`;
    }
    function marginText(sec) {
        const min = Math.round(sec / 60);
        return (min < 1 ? '<1 min' : `${min} min`) + ' zapasu na przesiadkę';
    }

    function drawFlow(flow) {
        setBaseDim(true);
        const faint = [], casings = [], bright = [], marginDots = [];
        const byLine = new Map();  // "num|kind" -> [segmenty] do plakietek

        for (const s of flow.segments) {        // posortowane po w rosnąco
            const key = s.num + '|' + s.kind;
            const color = FLOW_COLORS[s.kind] || FLOW_COLORS.other;
            const weight = 1 + 3.5 * s.w;
            const opacity = 0.10 + 0.85 * s.w;
            const line = L.polyline(s.path, {color, opacity, weight});
            line.bindTooltip(
                `${KIND_LABEL[s.kind] || KIND_LABEL.other} ${s.num}`,
                {sticky: true},
            );
            line.on('mouseover', () => {
                line.setStyle({opacity: 1, weight: weight + 2.5});
                line.bringToFront();       // spod wiązki na wierzch
            });
            line.on('mouseout', () => line.setStyle({opacity, weight}));
            if (s.w >= BRIGHT_W) {
                casings.push(L.polyline(s.path, {
                    color: '#fff',
                    opacity: 0.9,
                    weight: weight + 2.5,
                    interactive: false,
                }));
                bright.push(line);
            } else {
                faint.push(line);
            }
            if (!byLine.has(key)) byLine.set(key, []);
            byLine.get(key).push(s);
            if (s.transfer_margin !== null) {
                marginDots.push(L.circleMarker(s.path[0], {
                    radius: 5, weight: 1.5, color: '#fff',
                    fillColor: marginColor(s.transfer_margin), fillOpacity: 1,
                }).bindTooltip(marginText(s.transfer_margin)));
            }
        }

        // Kolejność: blade tło -> białe otoczki -> jaskrawe korytarze -> kropki zapasu na wierzchu.
        const layers = [...faint, ...casings, ...bright, ...marginDots];

        // Plakietki z numerem linii - tylko dla linii, które mają sensowny
        // udział w przepływie; na najjaśniejszym segmencie linii, dłuższe
        // segmenty dostają dodatkowe plakietki w 1/4 i 3/4 trasy.
        for (const [key, segs] of byLine) {
            const best = segs[segs.length - 1];
            if (best.w < 0.4) continue;
            const [num, kind] = key.split('|');
            const positions = new Set([Math.floor(best.path.length / 2)]);
            if (best.path.length >= 20) {
                positions.add(Math.floor(best.path.length / 4));
                positions.add(Math.floor(3 * best.path.length / 4));
            }
            for (const p of positions) {
                layers.push(L.marker(best.path[p], {
                    icon: L.divIcon({
                        className: `line-badge ${kind}`,
                        html: esc(num),
                        iconSize: null,
                    }),
                    interactive: false,
                    opacity: 0.45 + 0.55 * best.w,
                }));
            }
        }

        routeLayer = L.layerGroup(layers).addTo(map);

        // Kadr: najciaśniejszy sensowny próg jasności, żeby nie skakać
        // do widoku całego województwa przez jedną bladą nitkę...
        let points = [];
        for (const threshold of [0.7, BRIGHT_W, 0]) {
            points = flow.segments.filter(s => s.w >= threshold)
                                  .flatMap(s => s.path);
            if (points.length >= 4) break;
        }
        // ...ale start i cel muszą być w kadrze zawsze.
        for (const name of [sel.start, sel.end]) {
            for (const m of markersByName.get(name) || []) {
                const p = m.getLatLng();
                points.push([p.lat, p.lng]);
            }
        }
        if (points.length) {
            map.fitBounds(L.latLngBounds(points), {
                paddingTopLeft: [400, 30],     // miejsce na panel z lewej
                paddingBottomRight: [30, 30],
            });
        }
    }

    function search() {
        const params = new URLSearchParams({
            end: endInput.value,
            time: document.getElementById('time').value,
            qmin: (Number(document.getElementById('qmin').value) / 100).toFixed(2),
        });
        if (myLocation) {
            params.set('start_lat', myLocation.lat);
            params.set('start_lon', myLocation.lon);
        } else {
            params.set('start', startInput.value);
        }
        clearRoute();
        resultBox.innerHTML = '<p class="hint">Szukam…</p>';
        fetch('/api/flow?' + params)
            .then(r => r.json())
            .then(flow => {
                if (flow.error) { showError(flow.error, flow.suggestions); return; }
                // Kanoniczne nazwy z API: podświetlenie startu/celu działa
                // też przy ręcznym wpisaniu, nie tylko przy klikaniu w mapę
                // (drawFlow przemalowuje wszystkie markery wg nowego sel).
                sel = {start: flow.start, end: flow.end};
                startInput.value = flow.start;
                endInput.value = flow.end;
                resultBox.innerHTML = '';      // wynik jest tylko na mapie
                drawFlow(flow);
            })
            .catch(() => showError('Nie udało się połączyć z serwerem.'));
    }

    document.getElementById('search').addEventListener('click', search);

    // Suwak czułości: etykieta od razu, mapa po krótkim debounce
    // (odpowiedź z ciepłym cache to ~10 ms, więc działa "na żywo").
    const qminInput = document.getElementById('qmin');
    let qminTimer = null;
    qminInput.addEventListener('input', () => {
        document.getElementById('qmin-value').textContent = qminInput.value;
        clearTimeout(qminTimer);
        qminTimer = setTimeout(() => {
            if (startInput.value && endInput.value) search();
        }, 200);
    });

    document.getElementById('clear').addEventListener('click', () => {
        const previous = [sel.start, sel.end];
        sel = {start: null, end: null};
        startInput.value = '';
        endInput.value = '';
        clearRoute();
        clearMyLocation();
        restyle(...previous);
    });

    // Prawdziwa lokalizacja jako start - jednorazowy odczyt (nie watchPosition,
    // wyszukiwanie to jednorazowa akcja, nie potrzeba śledzenia na żywo).
    const MY_LOCATION_STYLE = {radius: 8, weight: 2, color: '#fff', fillColor: '#6200ea', fillOpacity: 1};

    function geoErrorMessage(err) {
        switch (err.code) {
            case err.PERMISSION_DENIED: return 'Brak zgody na dostęp do lokalizacji.';
            case err.POSITION_UNAVAILABLE: return 'Nie udało się ustalić lokalizacji.';
            case err.TIMEOUT: return 'Upłynął czas oczekiwania na lokalizację.';
            default: return 'Nie udało się pobrać lokalizacji.';
        }
    }

    document.getElementById('use-location').addEventListener('click', () => {
        if (!navigator.geolocation) {
            showError('Ta przeglądarka nie obsługuje geolokalizacji.');
            return;
        }
        resultBox.innerHTML = '<p class="hint">Ustalam lokalizację…</p>';
        navigator.geolocation.getCurrentPosition(
            pos => {
                const previous = [sel.start, sel.end];
                myLocation = {lat: pos.coords.latitude, lon: pos.coords.longitude};
                sel = {start: null, end: sel.end};
                if (myLocationMarker) map.removeLayer(myLocationMarker);
                myLocationMarker = L.circleMarker([myLocation.lat, myLocation.lon], MY_LOCATION_STYLE)
                    .bindTooltip('Twoja lokalizacja')
                    .addTo(map);
                startInput.value = 'Twoja lokalizacja';
                resultBox.innerHTML = '';
                restyle(...previous);
                map.setView([myLocation.lat, myLocation.lon], 15);
                if (endInput.value) search();
            },
            err => showError(geoErrorMessage(err)),
            {timeout: 10000},
        );
    });

    // Kliknięcie podpowiedzi wstawia nazwę w pierwsze niepasujące pole.
    const knownNames = () => new Set([...markersByName.keys()].map(n => n.toLowerCase()));
    resultBox.addEventListener('click', event => {
        const name = event.target.dataset && event.target.dataset.name;
        if (!name) return;
        event.preventDefault();
        const known = knownNames();
        if (!known.has(startInput.value.trim().toLowerCase())) {
            startInput.value = name;
        } else {
            endInput.value = name;
        }
        if (startInput.value && endInput.value) search();
    });
}
</script>

</body>
</html>
